version: '3.8'

services:
  nexus-node:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
      - "8883:8883"
    environment:
      - NODE_ID=docker-node-001
      - LOG_LEVEL=INFO
    volumes:
      - nexus-data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  nexus-data:
